<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    html, body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .urdu { font-family: 'Noto Naskh Arabic', serif; direction: rtl; }
    .scene { perspective: 1400px; }
    .card-3d {
      position: relative;
      width: 100%;
      aspect-ratio: 5 / 3;
      transform-style: preserve-3d;
      transition: transform 600ms cubic-bezier(.2,.8,.2,1), opacity 350ms ease;
      will-change: transform;
    }
    .card-3d.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 1.25rem;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card-back { transform: rotateY(180deg); }

    /* Swipe-out animations */
    .swipe-right { transform: translateX(140%) rotate(14deg) !important; opacity: 0 !important; }
    .swipe-left  { transform: translateX(-140%) rotate(-14deg) !important; opacity: 0 !important; }
    .swipe-in {
      animation: cardIn 350ms cubic-bezier(.2,.8,.2,1);
    }
    @keyframes cardIn {
      from { transform: translateY(24px) scale(.96); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Tap hint pulse */
    .tap-hint {
      animation: tapHint 1.6s ease-in-out infinite;
    }
    @keyframes tapHint {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Stacked cards behind the active one */
    .stack-card {
      position: absolute; inset: 0;
      border-radius: 1.25rem;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 text-slate-100">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 py-8">
    <!-- Header -->
    <header class="flex items-center justify-between gap-4 mb-6">
      <div>
        <h1 id="title" class="text-2xl sm:text-3xl font-extrabold tracking-tight">Flashcards<span class="text-amber-300">.</span></h1>
        <p class="text-xs sm:text-sm text-slate-400 mt-1">Tap or press <kbd class="px-1.5 py-0.5 bg-slate-800 rounded text-[10px]">Space</kbd> to flip. Then say if you knew it.</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="lang" class="bg-slate-800 border border-slate-700 rounded-lg text-sm px-3 py-2">
          <option value="en">English</option>
          <option value="ur">اردو</option>
          <option value="both">Both</option>
        </select>
        <label class="cursor-pointer text-xs sm:text-sm bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg px-3 py-2 font-semibold">
          Load JSON
          <input id="file-input" type="file" accept="application/json,.json" class="hidden" />
        </label>
      </div>
    </header>

    <!-- Progress -->
    <div class="mb-4">
      <div class="flex items-center justify-between text-xs text-slate-400 mb-1.5">
        <span><span id="learned-count">0</span> learned · <span id="remaining-count">0</span> remaining</span>
        <span id="deck-name" class="font-mono">cards.json</span>
      </div>
      <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-emerald-400 transition-all duration-500" style="width: 0%"></div>
      </div>
    </div>

    <!-- Card stage -->
    <div class="scene relative">
      <!-- decorative stacked cards -->
      <div class="stack-card bg-slate-800/40 border border-slate-700/60 -z-20" style="transform: translateY(18px) scale(.94);"></div>
      <div class="stack-card bg-slate-800/60 border border-slate-700/70 -z-10" style="transform: translateY(9px) scale(.97);"></div>

      <div id="card" class="card-3d cursor-pointer select-none" role="button" aria-label="Flashcard. Tap to flip.">
        <div class="card-face card-front bg-gradient-to-br from-indigo-500 via-violet-600 to-fuchsia-600 shadow-2xl">
          <div class="w-full">
            <div class="text-[11px] uppercase tracking-[0.25em] text-white/70 mb-3">Question</div>
            <div id="front-content" class="text-2xl sm:text-3xl font-semibold leading-snug"></div>
            <div class="mt-6 text-xs text-white/60 tap-hint">Tap to reveal</div>
          </div>
        </div>
        <div class="card-face card-back bg-gradient-to-br from-emerald-500 via-teal-500 to-cyan-600 shadow-2xl">
          <div class="w-full">
            <div class="text-[11px] uppercase tracking-[0.25em] text-white/80 mb-3">Answer</div>
            <div id="back-content" class="text-3xl sm:text-4xl font-bold leading-snug"></div>
          </div>
        </div>
      </div>

      <!-- Empty / done state -->
      <div id="empty" class="hidden absolute inset-0 rounded-2xl bg-slate-900/80 border border-slate-700 flex flex-col items-center justify-center text-center p-6">
        <div class="text-3xl">🎉</div>
        <div class="mt-2 text-xl font-bold">All cards learned!</div>
        <div class="text-sm text-slate-400 mt-1">Reset progress or load a new deck.</div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="mt-6 grid grid-cols-2 gap-3">
      <button id="btn-didnt" class="group rounded-xl bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/40 text-rose-300 hover:text-rose-200 px-4 py-4 font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed">
        <div class="text-sm">Didn't know</div>
        <div class="text-[11px] text-rose-300/70 mt-0.5">Press <kbd class="px-1 py-0.5 bg-slate-800 rounded">←</kbd> — repeats later</div>
      </button>
      <button id="btn-knew" class="group rounded-xl bg-emerald-500/15 hover:bg-emerald-500/25 border border-emerald-500/50 text-emerald-200 hover:text-emerald-100 px-4 py-4 font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed">
        <div class="text-sm">I knew it</div>
        <div class="text-[11px] text-emerald-300/70 mt-0.5">Press <kbd class="px-1 py-0.5 bg-slate-800 rounded">→</kbd> — marks learned</div>
      </button>
    </div>

    <div class="mt-3 flex items-center justify-between text-xs text-slate-400">
      <button id="btn-flip" class="hover:text-slate-200">Flip (Space)</button>
      <button id="btn-shuffle" class="hover:text-slate-200">Shuffle</button>
      <button id="btn-reset" class="hover:text-rose-300">Reset progress</button>
    </div>

    <p class="text-center text-[11px] text-slate-500 mt-8">
      Progress saved in your browser. JSON format: <code>{ "cards": [{ "front": {"en","ur"}, "back": {"en","ur"} }] }</code>
    </p>
  </div>

  <script>
    // -------------------- Defaults (fallback deck) --------------------
    const FALLBACK = {
      title: { en: "Sample deck", ur: "نمونہ" },
      cards: [
        { id: "salam",   front: { en: "Greeting — peace",      ur: "سلامتی کا تحیہ" }, back: { en: "Salam",  ur: "سلام" } },
        { id: "kitab",   front: { en: "Something you read",    ur: "پڑھنے کی چیز"   }, back: { en: "Book",   ur: "کتاب" } },
        { id: "pani",    front: { en: "Drink it to live",      ur: "زندگی کا مشروب" }, back: { en: "Water",  ur: "پانی" } },
        { id: "ghar",    front: { en: "Where you live",        ur: "رہنے کی جگہ"    }, back: { en: "Home",   ur: "گھر"  } },
        { id: "dost",    front: { en: "A close companion",     ur: "قریبی ساتھی"   }, back: { en: "Friend", ur: "دوست" } },
      ],
    };

    // -------------------- State --------------------
    const STORAGE_KEY = "flashcards.progress.v1";
    let deck = { title: { en: "" }, cards: [] };
    let deckSig = "";                  // signature to namespace localStorage
    let queue = [];                    // ids of cards still to learn (in order)
    let learned = new Set();           // ids the user has said "I knew it"
    let currentId = null;
    let flipped = false;
    let animating = false;
    let lang = localStorage.getItem("flashcards.lang") || "en";

    // -------------------- Elements --------------------
    const els = {
      card: document.getElementById("card"),
      front: document.getElementById("front-content"),
      back: document.getElementById("back-content"),
      empty: document.getElementById("empty"),
      title: document.getElementById("title"),
      deckName: document.getElementById("deck-name"),
      learnedCount: document.getElementById("learned-count"),
      remainingCount: document.getElementById("remaining-count"),
      progress: document.getElementById("progress-bar"),
      btnKnew: document.getElementById("btn-knew"),
      btnDidnt: document.getElementById("btn-didnt"),
      btnFlip: document.getElementById("btn-flip"),
      btnShuffle: document.getElementById("btn-shuffle"),
      btnReset: document.getElementById("btn-reset"),
      lang: document.getElementById("lang"),
      file: document.getElementById("file-input"),
    };
    els.lang.value = lang;

    // -------------------- Persistence --------------------
    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        return JSON.parse(raw) || {};
      } catch { return {}; }
    }
    function saveProgress(all) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    }
    function persist() {
      const all = loadProgress();
      all[deckSig] = { learned: [...learned], queue, ts: Date.now() };
      saveProgress(all);
    }
    function restoreFor(sig) {
      const all = loadProgress();
      const entry = all[sig];
      if (entry && Array.isArray(entry.learned)) return { learned: new Set(entry.learned), queue: Array.isArray(entry.queue) ? entry.queue : null };
      return { learned: new Set(), queue: null };
    }

    // -------------------- Deck setup --------------------
    function ensureIds(cards) {
      const seen = new Set();
      return cards.map((c, i) => {
        let id = c.id || `${(c.front?.en || c.front?.ur || "card")}__${(c.back?.en || c.back?.ur || "")}`;
        let unique = id, n = 1;
        while (seen.has(unique)) unique = `${id}#${++n}`;
        seen.add(unique);
        return { ...c, id: unique, _i: i };
      });
    }

    function signatureFor(d) {
      const t = d.title?.en || d.title?.ur || "deck";
      return `${t}::${d.cards.length}::${d.cards.map(c => c.id).join("|")}`.slice(0, 200);
    }

    function setDeck(d, source) {
      const cards = ensureIds(d.cards || []);
      deck = { title: d.title || {}, cards };
      deckSig = signatureFor(deck);
      const saved = restoreFor(deckSig);
      learned = saved.learned;
      // Drop learned cards from queue. Preserve saved queue order when possible.
      const remainingIds = deck.cards.map(c => c.id).filter(id => !learned.has(id));
      if (saved.queue && saved.queue.length) {
        const set = new Set(remainingIds);
        const ordered = saved.queue.filter(id => set.has(id));
        for (const id of remainingIds) if (!ordered.includes(id)) ordered.push(id);
        queue = ordered;
      } else {
        queue = remainingIds;
      }
      els.deckName.textContent = source || "cards.json";
      const titleText = (deck.title.en || deck.title.ur || "Flashcards");
      document.title = titleText;
      els.title.innerHTML = `${escapeHtml(titleText)}<span class="text-amber-300">.</span>`;
      next(true);
      updateStats();
    }

    // -------------------- Rendering --------------------
    function renderSide(el, content) {
      el.innerHTML = "";
      if (!content) { el.textContent = "—"; return; }
      const en = content.en || "";
      const ur = content.ur || "";
      if (lang === "en") {
        if (en) appendLine(el, en, false);
        else if (ur) appendLine(el, ur, true);
      } else if (lang === "ur") {
        if (ur) appendLine(el, ur, true);
        else if (en) appendLine(el, en, false);
      } else { // both
        if (en) appendLine(el, en, false);
        if (en && ur) {
          const sep = document.createElement("div");
          sep.className = "h-px bg-white/20 my-3";
          el.appendChild(sep);
        }
        if (ur) appendLine(el, ur, true);
      }
    }
    function appendLine(parent, text, isUrdu) {
      const div = document.createElement("div");
      div.className = isUrdu ? "urdu text-3xl sm:text-4xl leading-snug" : "leading-snug";
      div.textContent = text;
      parent.appendChild(div);
    }

    function updateStats() {
      const total = deck.cards.length;
      const learnedN = learned.size;
      els.learnedCount.textContent = learnedN;
      els.remainingCount.textContent = total - learnedN;
      els.progress.style.width = total ? `${Math.round((learnedN / total) * 100)}%` : "0%";
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
    }

    // -------------------- Flow --------------------
    function currentCard() {
      return deck.cards.find(c => c.id === currentId) || null;
    }

    function renderCurrent() {
      const c = currentCard();
      if (!c) {
        els.empty.classList.remove("hidden");
        els.card.classList.add("invisible");
        els.btnKnew.disabled = true;
        els.btnDidnt.disabled = true;
        return;
      }
      els.empty.classList.add("hidden");
      els.card.classList.remove("invisible");
      els.btnKnew.disabled = false;
      els.btnDidnt.disabled = false;
      renderSide(els.front, c.front);
      renderSide(els.back, c.back);
    }

    function next(initial = false) {
      flipped = false;
      els.card.classList.remove("flipped");
      currentId = queue[0] || null;
      renderCurrent();
      if (!initial) {
        els.card.classList.add("swipe-in");
        setTimeout(() => els.card.classList.remove("swipe-in"), 360);
      }
    }

    function flip() {
      if (animating) return;
      flipped = !flipped;
      els.card.classList.toggle("flipped", flipped);
    }

    function decide(known) {
      if (!currentId || animating) return;
      animating = true;
      // mark learned or requeue
      const id = currentId;
      if (known) {
        learned.add(id);
        queue = queue.filter(x => x !== id);
      } else {
        // move to the back of the queue so it shows up again
        queue = queue.filter(x => x !== id);
        queue.push(id);
      }
      persist();
      updateStats();
      // Animate out
      els.card.classList.add(known ? "swipe-right" : "swipe-left");
      setTimeout(() => {
        els.card.classList.remove("swipe-right", "swipe-left");
        animating = false;
        next();
      }, 420);
    }

    // -------------------- Events --------------------
    els.card.addEventListener("click", flip);
    els.btnFlip.addEventListener("click", flip);
    els.btnKnew.addEventListener("click", () => decide(true));
    els.btnDidnt.addEventListener("click", () => decide(false));

    els.btnShuffle.addEventListener("click", () => {
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
      persist();
      next();
    });

    els.btnReset.addEventListener("click", () => {
      if (!confirm("Reset progress for this deck?")) return;
      learned = new Set();
      queue = deck.cards.map(c => c.id);
      persist();
      updateStats();
      next();
    });

    els.lang.addEventListener("change", () => {
      lang = els.lang.value;
      localStorage.setItem("flashcards.lang", lang);
      renderCurrent();
    });

    window.addEventListener("keydown", (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); flip(); }
      else if (e.key === "ArrowRight") { e.preventDefault(); decide(true); }
      else if (e.key === "ArrowLeft")  { e.preventDefault(); decide(false); }
    });

    els.file.addEventListener("change", (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          setDeck(normalizeDeck(parsed), f.name);
        } catch (err) {
          alert(`Could not load ${f.name}: ${err.message}`);
        }
      };
      reader.readAsText(f);
    });

    // Accept either { cards: [...] } or a bare array.
    function normalizeDeck(parsed) {
      if (Array.isArray(parsed)) return { title: { en: "Deck" }, cards: parsed };
      if (parsed && Array.isArray(parsed.cards)) return parsed;
      throw new Error("Expected an array or an object with a 'cards' array.");
    }

    // -------------------- Boot --------------------
    // Accept ?deck=<url> to load any deck JSON. Default is cards.json next to
    // this page (so opening the page directly still works as before).
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const deckParam = params.get("deck");
      const url = deckParam || "cards.json";
      try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = normalizeDeck(await res.json());
        setDeck(data, url.split("/").pop() || url);
      } catch (err) {
        setDeck(FALLBACK, "(bundled fallback — use “Load JSON”)");
      }
    })();
  </script>
</body>
</html>
