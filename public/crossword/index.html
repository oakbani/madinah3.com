<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Crossword</title>
  <!-- Crossword layout generator (MichaelWehar/Crossword-Layout-Generator). Exposes global generateLayout(). -->
  <script src="https://cdn.jsdelivr.net/gh/MichaelWehar/Crossword-Layout-Generator@master/layout_generator.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111c34;
      --panel-2: #16223d;
      --ink: #e6edf7;
      --muted: #93a4c2;
      --accent: #ffd166;
      --accent-2: #6ee7b7;
      --error: #fb7185;
      --cell: #f8fafc;
      --cell-ink: #0f172a;
      --cell-active: #fff3bf;
      --cell-highlight: #ffe9a8;
      --block: #0b1325;
      --border: #1f2c4d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(1200px 800px at 10% -10%, #1b2a52 0%, var(--bg) 55%) fixed;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }
    header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 28px 32px 8px;
    }
    header h1 {
      margin: 0;
      font-size: 28px; letter-spacing: 0.5px;
    }
    header h1 .dot { color: var(--accent); }
    header .tag { color: var(--muted); font-size: 13px; }
    main {
      display: grid;
      grid-template-columns: minmax(320px, auto) 1fr;
      gap: 28px;
      padding: 16px 32px 40px;
      align-items: start;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; padding: 16px; }
    }
    .panel {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .board-wrap { display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .board {
      display: grid;
      gap: 2px;
      background: var(--block);
      padding: 6px;
      border-radius: 10px;
    }
    .cell {
      position: relative;
      width: 42px; height: 42px;
      background: var(--block);
      border-radius: 4px;
    }
    .cell.open {
      background: var(--cell);
    }
    .cell .num {
      position: absolute;
      top: 2px; left: 4px;
      font-size: 10px;
      color: var(--cell-ink);
      opacity: 0.7;
      pointer-events: none;
      font-weight: 600;
    }
    .cell input {
      width: 100%; height: 100%;
      border: 0; outline: 0;
      background: transparent;
      text-align: center;
      font-size: 20px; font-weight: 700;
      color: var(--cell-ink);
      text-transform: uppercase;
      caret-color: transparent;
      border-radius: 4px;
    }
    .cell.active input { background: var(--cell-active); }
    .cell.highlight input { background: var(--cell-highlight); }
    .cell.correct input { color: #065f46; }
    .cell.wrong input { color: var(--error); }

    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button.btn {
      background: var(--panel-2);
      color: var(--ink);
      border: 1px solid var(--border);
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
    }
    button.btn:hover { background: #1c2a4d; border-color: #2b3d6b; }
    button.btn:active { transform: translateY(1px); }
    button.btn.primary { background: var(--accent); color: #1f1505; border-color: #c79b3a; }
    button.btn.primary:hover { background: #ffdd86; }
    button.btn.ghost { background: transparent; }

    .clues { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 700px) { .clues { grid-template-columns: 1fr; } }
    .clues h2 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-2);
    }
    .clues ol { margin: 0; padding-left: 24px; }
    .clues li {
      padding: 6px 6px;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      line-height: 1.35;
      font-size: 14px;
    }
    .clues li:hover { background: rgba(255,255,255,0.04); color: var(--ink); }
    .clues li.active {
      background: rgba(255, 209, 102, 0.15);
      color: var(--ink);
    }
    .status {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }
    .status.win { color: var(--accent-2); font-weight: 700; }
    .status.bad { color: var(--error); }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 32px 24px;
    }
    footer a { color: var(--accent-2); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Mini Crossword<span class="dot">.</span></h1>
    <div class="tag">Built with <code>crossword-layout-generator</code></div>
  </header>

  <main>
    <section class="panel board-wrap">
      <div id="board" class="board" role="grid" aria-label="Crossword grid"></div>
      <div class="toolbar">
        <button class="btn primary" id="check">Check</button>
        <button class="btn" id="reveal-letter">Reveal letter</button>
        <button class="btn" id="reveal-word">Reveal word</button>
        <button class="btn ghost" id="clear">Clear</button>
        <button class="btn ghost" id="solve">Solve</button>
      </div>
      <div id="status" class="status">Pick a clue or click a square to start.</div>
    </section>

    <section class="panel">
      <div class="clues">
        <div>
          <h2>Across</h2>
          <ol id="across"></ol>
        </div>
        <div>
          <h2>Down</h2>
          <ol id="down"></ol>
        </div>
      </div>
    </section>
  </main>

  <footer>
    Layout by
    <a href="https://github.com/MichaelWehar/Crossword-Layout-Generator" target="_blank" rel="noreferrer">
      MichaelWehar/Crossword-Layout-Generator
    </a>
  </footer>

  <script>
    // ---- Sample words ---------------------------------------------------
    const WORDS = [
      { answer: "javascript", clue: "Language of the web" },
      { answer: "python",     clue: "Snake-named programming language" },
      { answer: "react",      clue: "Popular UI library by Meta" },
      { answer: "node",       clue: "JS runtime built on V8" },
      { answer: "typescript", clue: "JavaScript with static types" },
      { answer: "html",       clue: "Markup language of web pages" },
      { answer: "css",        clue: "Styles for the web" },
      { answer: "git",        clue: "Distributed version control system" },
      { answer: "array",      clue: "Ordered list data structure" },
      { answer: "object",     clue: "Key/value JS data structure" },
      { answer: "loop",       clue: "Repeats a block of code" },
      { answer: "promise",    clue: "Async value placeholder in JS" },
    ];

    // ---- Generate layout ------------------------------------------------
    const layout = generateLayout(WORDS);
    const placed = layout.result.filter(w => w.orientation !== "none");
    const cols = layout.cols;
    const rows = layout.rows;

    // Build solution grid: solution[y][x] = letter or null
    const solution = Array.from({ length: rows }, () => Array(cols).fill(null));
    // Map "x,y" -> { number, words: [{entry, index}] }
    const cellMeta = {};

    for (const w of placed) {
      const letters = w.answer.toUpperCase().split("");
      for (let i = 0; i < letters.length; i++) {
        const x = (w.orientation === "across" ? w.startx + i : w.startx) - 1;
        const y = (w.orientation === "down"   ? w.starty + i : w.starty) - 1;
        solution[y][x] = letters[i];
        const key = x + "," + y;
        if (!cellMeta[key]) cellMeta[key] = { number: null, words: [] };
        cellMeta[key].words.push({ entry: w, idx: i });
      }
      // numbering at start cell
      const sx = w.startx - 1, sy = w.starty - 1;
      const key = sx + "," + sy;
      if (!cellMeta[key].number) cellMeta[key].number = w.position;
      else cellMeta[key].number = Math.min(cellMeta[key].number, w.position);
    }

    // ---- Render board ---------------------------------------------------
    const board = document.getElementById("board");
    board.style.gridTemplateColumns = `repeat(${cols}, 42px)`;
    board.style.gridTemplateRows    = `repeat(${rows}, 42px)`;

    /** cellEls[y][x] = { wrap, input } or null */
    const cellEls = Array.from({ length: rows }, () => Array(cols).fill(null));

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const wrap = document.createElement("div");
        wrap.className = "cell";
        if (solution[y][x]) {
          wrap.classList.add("open");
          const meta = cellMeta[x + "," + y];
          if (meta && meta.number) {
            const n = document.createElement("span");
            n.className = "num";
            n.textContent = meta.number;
            wrap.appendChild(n);
          }
          const input = document.createElement("input");
          input.maxLength = 1;
          input.setAttribute("inputmode", "latin");
          input.setAttribute("autocomplete", "off");
          input.setAttribute("aria-label", `Row ${y + 1}, column ${x + 1}`);
          input.dataset.x = x;
          input.dataset.y = y;
          wrap.appendChild(input);
          cellEls[y][x] = { wrap, input };
        }
        board.appendChild(wrap);
      }
    }

    // ---- Selection / navigation ----------------------------------------
    let activeEntry = null;     // current word
    let activePos = null;       // {x,y} active cell

    function setActive(entry, x, y) {
      activeEntry = entry;
      activePos = { x, y };
      // clear highlight
      for (let yy = 0; yy < rows; yy++) {
        for (let xx = 0; xx < cols; xx++) {
          const c = cellEls[yy][xx];
          if (c) c.wrap.classList.remove("active", "highlight");
        }
      }
      if (entry) {
        for (let i = 0; i < entry.answer.length; i++) {
          const cx = (entry.orientation === "across" ? entry.startx + i : entry.startx) - 1;
          const cy = (entry.orientation === "down"   ? entry.starty + i : entry.starty) - 1;
          cellEls[cy][cx].wrap.classList.add("highlight");
        }
      }
      if (x != null) {
        cellEls[y][x].wrap.classList.remove("highlight");
        cellEls[y][x].wrap.classList.add("active");
        cellEls[y][x].input.focus();
        cellEls[y][x].input.select();
      }
      renderCluesActive();
    }

    function entriesAt(x, y) {
      const m = cellMeta[x + "," + y];
      return m ? m.words.map(w => w.entry) : [];
    }

    function pickEntryFor(x, y, prefer) {
      const entries = entriesAt(x, y);
      if (entries.length === 0) return null;
      if (prefer) {
        const found = entries.find(e => e.orientation === prefer);
        if (found) return found;
      }
      // if already on a word at this cell, toggle direction
      if (activeEntry && entries.includes(activeEntry) && entries.length > 1) {
        return entries.find(e => e !== activeEntry) || activeEntry;
      }
      return entries[0];
    }

    function move(dx, dy) {
      if (!activePos) return;
      let { x, y } = activePos;
      for (let step = 0; step < Math.max(rows, cols); step++) {
        x += dx; y += dy;
        if (x < 0 || y < 0 || x >= cols || y >= rows) return;
        if (cellEls[y][x]) {
          setActive(activeEntry && entriesAt(x, y).includes(activeEntry) ? activeEntry : pickEntryFor(x, y), x, y);
          return;
        }
      }
    }

    function advanceInWord() {
      if (!activeEntry || !activePos) return;
      const dx = activeEntry.orientation === "across" ? 1 : 0;
      const dy = activeEntry.orientation === "down"   ? 1 : 0;
      const nx = activePos.x + dx, ny = activePos.y + dy;
      if (cellEls[ny] && cellEls[ny][nx]) setActive(activeEntry, nx, ny);
    }

    function retreatInWord() {
      if (!activeEntry || !activePos) return;
      const dx = activeEntry.orientation === "across" ? -1 : 0;
      const dy = activeEntry.orientation === "down"   ? -1 : 0;
      const nx = activePos.x + dx, ny = activePos.y + dy;
      if (cellEls[ny] && cellEls[ny][nx]) setActive(activeEntry, nx, ny);
    }

    board.addEventListener("click", (e) => {
      const input = e.target.closest("input");
      if (!input) return;
      const x = +input.dataset.x, y = +input.dataset.y;
      setActive(pickEntryFor(x, y), x, y);
    });

    board.addEventListener("input", (e) => {
      const input = e.target;
      if (!(input instanceof HTMLInputElement)) return;
      const v = (input.value || "").toUpperCase().replace(/[^A-Z]/g, "").slice(-1);
      input.value = v;
      input.parentElement.classList.remove("correct", "wrong");
      if (v) advanceInWord();
    });

    board.addEventListener("keydown", (e) => {
      const input = e.target;
      if (!(input instanceof HTMLInputElement)) return;
      switch (e.key) {
        case "ArrowRight": e.preventDefault(); move(1, 0); break;
        case "ArrowLeft":  e.preventDefault(); move(-1, 0); break;
        case "ArrowDown":  e.preventDefault(); move(0, 1); break;
        case "ArrowUp":    e.preventDefault(); move(0, -1); break;
        case "Tab": {
          e.preventDefault();
          const ordered = [...placed].sort((a, b) => a.position - b.position);
          const cur = ordered.indexOf(activeEntry);
          const next = ordered[(cur + (e.shiftKey ? -1 : 1) + ordered.length) % ordered.length];
          setActive(next, next.startx - 1, next.starty - 1);
          break;
        }
        case "Backspace":
          if (!input.value) {
            e.preventDefault();
            retreatInWord();
            if (activePos) {
              const c = cellEls[activePos.y][activePos.x];
              c.input.value = "";
              c.wrap.classList.remove("correct", "wrong");
            }
          }
          break;
        case " ":
        case "Spacebar":
          e.preventDefault();
          if (activePos) {
            const other = pickEntryFor(activePos.x, activePos.y,
              activeEntry && activeEntry.orientation === "across" ? "down" : "across");
            setActive(other, activePos.x, activePos.y);
          }
          break;
      }
    });

    // ---- Clues ---------------------------------------------------------
    const acrossList = document.getElementById("across");
    const downList   = document.getElementById("down");
    const sorted = [...placed].sort((a, b) => a.position - b.position);
    for (const entry of sorted) {
      const li = document.createElement("li");
      li.value = entry.position;
      li.textContent = entry.clue;
      li.dataset.pos = entry.position;
      li.dataset.dir = entry.orientation;
      li.addEventListener("click", () => setActive(entry, entry.startx - 1, entry.starty - 1));
      (entry.orientation === "across" ? acrossList : downList).appendChild(li);
    }

    function renderCluesActive() {
      for (const li of document.querySelectorAll(".clues li")) {
        li.classList.toggle("active",
          activeEntry &&
          +li.dataset.pos === activeEntry.position &&
          li.dataset.dir === activeEntry.orientation);
      }
    }

    // ---- Buttons -------------------------------------------------------
    const status = document.getElementById("status");
    function setStatus(msg, kind) {
      status.textContent = msg;
      status.classList.remove("win", "bad");
      if (kind) status.classList.add(kind);
    }

    document.getElementById("check").addEventListener("click", () => {
      let total = 0, correct = 0, filled = 0;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const c = cellEls[y][x];
          if (!c) continue;
          total++;
          const expected = solution[y][x];
          const got = (c.input.value || "").toUpperCase();
          c.wrap.classList.remove("correct", "wrong");
          if (got) {
            filled++;
            if (got === expected) { c.wrap.classList.add("correct"); correct++; }
            else c.wrap.classList.add("wrong");
          }
        }
      }
      if (correct === total) setStatus("Solved! Great work. 🎉", "win");
      else if (filled === total) setStatus(`${correct}/${total} correct — keep trying.`, "bad");
      else setStatus(`${correct}/${total} correct, ${total - filled} blank.`);
    });

    document.getElementById("reveal-letter").addEventListener("click", () => {
      if (!activePos) return;
      const { x, y } = activePos;
      const c = cellEls[y][x];
      c.input.value = solution[y][x];
      c.wrap.classList.remove("wrong");
      c.wrap.classList.add("correct");
      advanceInWord();
    });

    document.getElementById("reveal-word").addEventListener("click", () => {
      if (!activeEntry) return;
      for (let i = 0; i < activeEntry.answer.length; i++) {
        const x = (activeEntry.orientation === "across" ? activeEntry.startx + i : activeEntry.startx) - 1;
        const y = (activeEntry.orientation === "down"   ? activeEntry.starty + i : activeEntry.starty) - 1;
        const c = cellEls[y][x];
        c.input.value = solution[y][x];
        c.wrap.classList.remove("wrong");
        c.wrap.classList.add("correct");
      }
    });

    document.getElementById("clear").addEventListener("click", () => {
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const c = cellEls[y][x];
          if (!c) continue;
          c.input.value = "";
          c.wrap.classList.remove("correct", "wrong");
        }
      }
      setStatus("Cleared. Good luck!");
    });

    document.getElementById("solve").addEventListener("click", () => {
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const c = cellEls[y][x];
          if (!c) continue;
          c.input.value = solution[y][x];
          c.wrap.classList.remove("wrong");
          c.wrap.classList.add("correct");
        }
      }
      setStatus("Solution revealed.", "win");
    });

    // ---- Start ---------------------------------------------------------
    if (sorted.length) {
      const first = sorted[0];
      setActive(first, first.startx - 1, first.starty - 1);
    }
  </script>
</body>
</html>
