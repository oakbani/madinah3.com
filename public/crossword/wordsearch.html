<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Search</title>
  <!-- Uses the same crossword-layout-generator library to place words; we fill the empty cells with random letters. -->
  <script src="https://cdn.jsdelivr.net/gh/MichaelWehar/Crossword-Layout-Generator@master/layout_generator.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111c34;
      --panel-2: #16223d;
      --ink: #e6edf7;
      --muted: #93a4c2;
      --accent: #ffd166;
      --accent-2: #6ee7b7;
      --error: #fb7185;
      --cell: #f8fafc;
      --cell-ink: #0f172a;
      --border: #1f2c4d;
      --sel: rgba(255, 209, 102, 0.45);
      --found: rgba(110, 231, 183, 0.55);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: radial-gradient(1200px 800px at 10% -10%, #1b2a52 0%, var(--bg) 55%) fixed;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }
    header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 28px 32px 8px;
    }
    header h1 { margin: 0; font-size: 28px; letter-spacing: 0.5px; }
    header h1 .dot { color: var(--accent); }
    header .tag { color: var(--muted); font-size: 13px; }

    main {
      display: grid;
      grid-template-columns: minmax(320px, auto) 1fr;
      gap: 28px;
      padding: 16px 32px 40px;
      align-items: start;
    }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; padding: 16px; } }

    .panel {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .board-wrap { display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .board-stage { position: relative; }
    .board {
      display: grid;
      gap: 2px;
      background: #0b1325;
      padding: 6px;
      border-radius: 10px;
      user-select: none;
      touch-action: none;
    }
    .cell {
      position: relative;
      width: 38px; height: 38px;
      background: var(--cell);
      color: var(--cell-ink);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
    }
    .cell.dim { color: #94a3b8; }
    /* selection / found overlays drawn as SVG above grid */
    svg.overlay {
      position: absolute; inset: 6px;
      pointer-events: none;
    }
    .selection { stroke: var(--accent); }
    .found-line { stroke: var(--accent-2); }
    .overlay line {
      stroke-width: 32;
      stroke-linecap: round;
      opacity: 0.45;
    }

    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button.btn {
      background: var(--panel-2); color: var(--ink);
      border: 1px solid var(--border);
      padding: 9px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button.btn:hover { background: #1c2a4d; border-color: #2b3d6b; }
    button.btn.primary { background: var(--accent); color: #1f1505; border-color: #c79b3a; }
    button.btn.primary:hover { background: #ffdd86; }

    .status { min-height: 22px; font-size: 14px; color: var(--muted); text-align: center; }
    .status.win { color: var(--accent-2); font-weight: 700; }

    .words h2 {
      margin: 0 0 10px;
      font-size: 14px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--accent-2);
    }
    .words ul {
      list-style: none; padding: 0; margin: 0;
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 16px;
    }
    @media (max-width: 700px) { .words ul { grid-template-columns: 1fr; } }
    .words li {
      padding: 8px 10px; border-radius: 8px;
      color: var(--ink);
      background: rgba(255,255,255,0.03);
      display: flex; flex-direction: column; gap: 2px;
      font-size: 14px;
    }
    .words li.found {
      color: #064e3b;
      background: var(--accent-2);
    }
    .words li.found .answer { text-decoration: line-through; text-decoration-color: rgba(6, 78, 59, 0.6); }
    .words li .clue { font-size: 14px; }
    .words li .answer {
      font-size: 11px; letter-spacing: 0.18em;
      opacity: 0.85; font-weight: 700;
    }
    .words li .answer.hidden { letter-spacing: 0.25em; }
    .words li .answer.hidden::before { content: ""; }
    .file-row {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      margin-bottom: 12px;
      font-size: 12px; color: var(--muted);
    }
    .file-row label.file-btn {
      background: var(--panel-2); color: var(--ink);
      border: 1px solid var(--border);
      padding: 6px 10px; border-radius: 8px; cursor: pointer;
      font-weight: 600;
    }
    .file-row input[type=file] { display: none; }
    .file-row .file-name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 8px 32px 24px; }
    footer a { color: var(--accent-2); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Word Search<span class="dot">.</span></h1>
    <div class="tag">Drag across letters to circle each word.</div>
  </header>

  <main>
    <section class="panel board-wrap">
      <div class="board-stage">
        <div id="board" class="board" role="grid" aria-label="Word search grid"></div>
        <svg id="overlay" class="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="toolbar">
        <button class="btn primary" id="new-game">New game</button>
        <button class="btn" id="hint">Hint</button>
        <button class="btn" id="reveal-all">Reveal all</button>
      </div>
      <div id="status" class="status">Click and drag (or tap and drag) across a word.</div>
    </section>

    <section class="panel words">
      <h2>Find these words</h2>
      <div class="file-row">
        <label class="file-btn" for="file-input">Load words.json</label>
        <input type="file" id="file-input" accept="application/json,.json" />
        <span class="file-name" id="file-name">words.json</span>
      </div>
      <ul id="wordlist"></ul>
    </section>
  </main>

  <footer>
    Layout via
    <a href="https://github.com/MichaelWehar/Crossword-Layout-Generator" target="_blank" rel="noreferrer">
      crossword-layout-generator
    </a>
  </footer>

  <script>
    // Fallback word list, used if words.json can't be loaded (e.g. opened via file://
    // without a local server). Replace by loading a JSON file via the "Load words.json"
    // button or by serving the folder over http.
    const FALLBACK_WORDS = [
      { answer: "javascript", clue: "Language of the web" },
      { answer: "python",     clue: "Snake-named language" },
      { answer: "react",      clue: "UI library by Meta" },
      { answer: "node",       clue: "JS runtime on V8" },
      { answer: "typescript", clue: "JS with static types" },
      { answer: "html",       clue: "Markup of web pages" },
      { answer: "css",        clue: "Styles for the web" },
      { answer: "git",        clue: "Version control" },
      { answer: "array",      clue: "Ordered list" },
      { answer: "object",     clue: "Key/value structure" },
      { answer: "loop",       clue: "Repeats code" },
      { answer: "promise",    clue: "Async value" },
    ];

    let WORDS = FALLBACK_WORDS;
    let allRevealed = false;

    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const board = document.getElementById("board");
    const overlay = document.getElementById("overlay");
    const wordlist = document.getElementById("wordlist");
    const statusEl = document.getElementById("status");

    let cols = 0, rows = 0;
    let solutionGrid = [];           // 2D array of letters
    let realLetterAt = [];           // 2D boolean: part of a placed word
    let cellEls = [];                // 2D array of DOM cells
    let placedWords = [];            // word entries actually placed
    let foundSet = new Set();
    let pendingHint = null;

    // ---- Build puzzle ---------------------------------------------------
    function buildPuzzle() {
      const layout = generateLayout(WORDS);
      placedWords = layout.result.filter(w => w.orientation !== "none");
      cols = layout.cols;
      rows = layout.rows;
      solutionGrid = Array.from({ length: rows }, () => Array(cols).fill(null));
      realLetterAt = Array.from({ length: rows }, () => Array(cols).fill(false));

      for (const w of placedWords) {
        const letters = w.answer.toUpperCase().split("");
        for (let i = 0; i < letters.length; i++) {
          const x = (w.orientation === "across" ? w.startx + i : w.startx) - 1;
          const y = (w.orientation === "down"   ? w.starty + i : w.starty) - 1;
          solutionGrid[y][x] = letters[i];
          realLetterAt[y][x] = true;
        }
      }
      // Fill empty cells with random letters
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (!solutionGrid[y][x]) {
            solutionGrid[y][x] = ALPHABET[Math.floor(Math.random() * 26)];
          }
        }
      }
    }

    // ---- Render --------------------------------------------------------
    function render() {
      board.innerHTML = "";
      overlay.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${cols}, 38px)`;
      board.style.gridTemplateRows    = `repeat(${rows}, 38px)`;
      cellEls = Array.from({ length: rows }, () => Array(cols).fill(null));

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const div = document.createElement("div");
          div.className = "cell";
          if (!realLetterAt[y][x]) div.classList.add("dim");
          div.textContent = solutionGrid[y][x];
          div.dataset.x = x;
          div.dataset.y = y;
          board.appendChild(div);
          cellEls[y][x] = div;
        }
      }

      // word list — answers stay hidden until found or revealed
      wordlist.innerHTML = "";
      foundSet = new Set();
      allRevealed = false;
      const sorted = [...placedWords].sort((a, b) =>
        (a.clue || "").localeCompare(b.clue || "") || a.answer.localeCompare(b.answer));
      for (const w of sorted) {
        const li = document.createElement("li");
        const upper = w.answer.toUpperCase();
        li.dataset.answer = upper;
        const masked = "·".repeat(w.answer.length);
        const clueText = w.clue ? escapeHtml(w.clue) : `(${w.answer.length} letters)`;
        li.innerHTML =
          `<span class="clue">${clueText}</span>` +
          `<span class="answer hidden" data-real="${upper}" aria-hidden="true">${masked} · ${w.answer.length} letters</span>`;
        wordlist.appendChild(li);
      }
      setStatus(`Find ${placedWords.length} words. Drag in any of 8 directions.`);
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    // ---- Geometry ------------------------------------------------------
    // The board uses 38px cells with 2px gap and 6px outer padding.
    // overlay element is positioned inset:6px on .board-stage, so coords are
    // relative to the inner grid area. Cell i center = i*(38+2) + 19.
    const CELL = 38, GAP = 2;
    function cellCenter(x, y) {
      return { cx: x * (CELL + GAP) + CELL / 2, cy: y * (CELL + GAP) + CELL / 2 };
    }
    function sizeOverlay() {
      const w = cols * CELL + (cols - 1) * GAP;
      const h = rows * CELL + (rows - 1) * GAP;
      overlay.setAttribute("viewBox", `0 0 ${w} ${h}`);
      overlay.setAttribute("width", w);
      overlay.setAttribute("height", h);
    }

    // ---- Selection -----------------------------------------------------
    let dragging = false;
    let startCell = null;
    let endCell = null;
    let liveLine = null;

    function cellAtEvent(e) {
      const t = (e.touches && e.touches[0]) || e;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const cell = el && el.closest && el.closest(".cell");
      if (!cell || !board.contains(cell)) return null;
      return { x: +cell.dataset.x, y: +cell.dataset.y };
    }

    // Snap endCell to nearest of the 8 directions from startCell
    function snap(s, e) {
      const dx = e.x - s.x, dy = e.y - s.y;
      if (dx === 0 && dy === 0) return { x: s.x, y: s.y };
      const adx = Math.abs(dx), ady = Math.abs(dy);
      let stepX = 0, stepY = 0, len;
      if (adx > ady * 2) { stepX = Math.sign(dx); stepY = 0; len = adx; }
      else if (ady > adx * 2) { stepX = 0; stepY = Math.sign(dy); len = ady; }
      else { stepX = Math.sign(dx); stepY = Math.sign(dy); len = Math.max(adx, ady); }
      return { x: s.x + stepX * len, y: s.y + stepY * len, stepX, stepY, len };
    }

    function drawSelection() {
      if (liveLine) liveLine.remove();
      liveLine = null;
      if (!startCell || !endCell) return;
      const a = cellCenter(startCell.x, startCell.y);
      const b = cellCenter(endCell.x, endCell.y);
      liveLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
      liveLine.setAttribute("x1", a.cx); liveLine.setAttribute("y1", a.cy);
      liveLine.setAttribute("x2", b.cx); liveLine.setAttribute("y2", b.cy);
      liveLine.setAttribute("class", "selection");
      overlay.appendChild(liveLine);
    }

    function lettersAlong(s, snapped) {
      const cells = [];
      if (snapped.x === s.x && snapped.y === s.y) {
        cells.push({ x: s.x, y: s.y });
      } else {
        const { stepX, stepY, len } = snapped;
        for (let i = 0; i <= len; i++) {
          const x = s.x + stepX * i, y = s.y + stepY * i;
          if (x < 0 || y < 0 || x >= cols || y >= rows) break;
          cells.push({ x, y });
        }
      }
      const word = cells.map(c => solutionGrid[c.y][c.x]).join("");
      return { cells, word };
    }

    function onDown(e) {
      const c = cellAtEvent(e);
      if (!c) return;
      e.preventDefault();
      dragging = true;
      startCell = c;
      endCell = c;
      drawSelection();
    }
    function onMove(e) {
      if (!dragging) return;
      const c = cellAtEvent(e);
      if (!c) return;
      e.preventDefault();
      endCell = snap(startCell, c);
      drawSelection();
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      if (startCell && endCell) {
        const snapped = (endCell.stepX === undefined) ? snap(startCell, endCell) : endCell;
        const { word } = lettersAlong(startCell, snapped);
        tryMatch(word, startCell, snapped);
      }
      if (liveLine) { liveLine.remove(); liveLine = null; }
      startCell = endCell = null;
    }

    board.addEventListener("mousedown", onDown);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    board.addEventListener("touchstart", onDown, { passive: false });
    board.addEventListener("touchmove", onMove, { passive: false });
    board.addEventListener("touchend", onUp);

    // ---- Matching ------------------------------------------------------
    function tryMatch(word, startC, snapped) {
      const reversed = word.split("").reverse().join("");
      const candidates = new Set([word, reversed]);
      const found = placedWords.find(w => {
        if (foundSet.has(w.answer.toUpperCase())) return false;
        return candidates.has(w.answer.toUpperCase());
      });
      if (!found) {
        flashStatus(`"${word}" — not a word.`);
        return;
      }
      foundSet.add(found.answer.toUpperCase());
      markFound(startC, snapped, found);
      const li = wordlist.querySelector(`li[data-answer="${found.answer.toUpperCase()}"]`);
      if (li) {
        li.classList.add("found");
        revealAnswerInLi(li);
      }
      if (foundSet.size === placedWords.length) {
        setStatus("All words found! 🎉", "win");
      } else {
        setStatus(`Nice — ${found.answer.toUpperCase()} found. ${placedWords.length - foundSet.size} to go.`);
      }
    }

    function markFound(startC, snapped, entry) {
      const a = cellCenter(startC.x, startC.y);
      const b = cellCenter(snapped.x, snapped.y);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", a.cx); line.setAttribute("y1", a.cy);
      line.setAttribute("x2", b.cx); line.setAttribute("y2", b.cy);
      line.setAttribute("class", "found-line");
      overlay.appendChild(line);
    }

    function revealAnswerInLi(li) {
      const ans = li.querySelector(".answer");
      if (!ans) return;
      ans.textContent = ans.dataset.real;
      ans.classList.remove("hidden");
      ans.removeAttribute("aria-hidden");
    }

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.classList.remove("win");
      if (kind === "win") statusEl.classList.add("win");
    }
    function flashStatus(msg) {
      const prev = statusEl.textContent;
      setStatus(msg);
      clearTimeout(flashStatus._t);
      flashStatus._t = setTimeout(() => {
        if (foundSet.size === placedWords.length) return;
        setStatus(`${placedWords.length - foundSet.size} word(s) left.`);
      }, 1400);
    }

    // ---- Buttons -------------------------------------------------------
    document.getElementById("new-game").addEventListener("click", () => {
      buildPuzzle(); sizeOverlay(); render();
    });
    document.getElementById("hint").addEventListener("click", () => {
      const remaining = placedWords.filter(w => !foundSet.has(w.answer.toUpperCase()));
      if (!remaining.length) return;
      const w = remaining[Math.floor(Math.random() * remaining.length)];
      const sx = w.startx - 1, sy = w.starty - 1;
      const el = cellEls[sy][sx];
      el.animate(
        [{ outline: "3px solid var(--accent)" }, { outline: "3px solid transparent" }],
        { duration: 1400, iterations: 2 }
      );
      setStatus(`Hint: "${w.answer.toUpperCase()}" starts at row ${sy + 1}, col ${sx + 1} (${w.orientation}).`);
    });
    document.getElementById("reveal-all").addEventListener("click", () => {
      for (const w of placedWords) {
        const upper = w.answer.toUpperCase();
        if (!foundSet.has(upper)) {
          const sx = w.startx - 1, sy = w.starty - 1;
          const ex = (w.orientation === "across" ? w.startx + w.answer.length - 1 : w.startx) - 1;
          const ey = (w.orientation === "down"   ? w.starty + w.answer.length - 1 : w.starty) - 1;
          markFound({ x: sx, y: sy }, { x: ex, y: ey }, w);
          foundSet.add(upper);
        }
        const li = wordlist.querySelector(`li[data-answer="${upper}"]`);
        if (li) {
          li.classList.add("found");
          revealAnswerInLi(li);
        }
      }
      allRevealed = true;
      setStatus("All words revealed.", "win");
    });

    // ---- Word list loading --------------------------------------------
    function validateWords(arr) {
      if (!Array.isArray(arr)) throw new Error("JSON must be an array.");
      const cleaned = [];
      for (const item of arr) {
        if (!item || typeof item !== "object") continue;
        const answer = String(item.answer || "").trim();
        if (!answer || !/^[A-Za-z]+$/.test(answer)) continue;
        cleaned.push({ answer, clue: item.clue ? String(item.clue) : "" });
      }
      if (!cleaned.length) throw new Error("No valid {answer, clue} entries.");
      return cleaned;
    }

    async function loadWordsFromUrl(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return validateWords(await res.json());
    }

    function restart(words, sourceLabel) {
      WORDS = words;
      document.getElementById("file-name").textContent = sourceLabel;
      buildPuzzle(); sizeOverlay(); render();
    }

    document.getElementById("file-input").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const words = validateWords(JSON.parse(reader.result));
          restart(words, file.name);
        } catch (err) {
          setStatus(`Could not load ${file.name}: ${err.message}`);
        }
      };
      reader.onerror = () => setStatus(`Could not read ${file.name}.`);
      reader.readAsText(file);
    });

    // ---- Start ---------------------------------------------------------
    (async () => {
      try {
        const words = await loadWordsFromUrl("words.json");
        restart(words, "words.json");
      } catch (err) {
        // Likely opened via file:// — fall back to bundled list.
        restart(FALLBACK_WORDS, "(bundled fallback — use \u201CLoad words.json\u201D)");
      }
    })();
  </script>
</body>
</html>
